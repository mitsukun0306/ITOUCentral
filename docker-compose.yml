# ローカル開発用 PostgreSQL(任意)
# 使い方: docker compose up -d でDB起動 → npm run db:migrate → npm run db:seed → npm run dev
services:
  db:
    image: postgres:16-alpine
    container_name: itoucentral-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: itoucentral
      POSTGRES_PASSWORD: itoucentral
      POSTGRES_DB: itoucentral
    ports:
      - "5432:5432"
    volumes:
      - itoucentral_pgdata:/var/lib/postgresql/data

volumes:
  itoucentral_pgdata:
